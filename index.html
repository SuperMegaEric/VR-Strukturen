<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Moleküle</title>

<!-- A-Frame Engine -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- Bewegung -->
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

<!-- Interaktion -->
<script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>

</head>

<body>

<!--
Minimale VR/AR Szene
Keine Umgebung – nur Moleküle
-->

<a-scene background="color: #ffffff" physics="debug:false">

<!-- =============================== -->
<!-- Assets (3D Modelle) -->
<!-- =============================== -->

<a-assets>

<a-asset-item id="diamant" src="Diamant.glb"></a-asset-item>
<a-asset-item id="graphit" src="Graphit.glb"></a-asset-item>
<a-asset-item id="imidazol" src="Imidazol.glb"></a-asset-item>
<a-asset-item id="eis" src="Eis.glb"></a-asset-item>
<a-asset-item id="mgcl2" src="MgCl2.glb"></a-asset-item>
<a-asset-item id="mof" src="MOF.glb"></a-asset-item>

</a-assets>

<!-- =============================== -->
<!-- Licht -->
<!-- =============================== -->

<!-- Grundlicht -->

<a-entity light="type: ambient; intensity: 0.8"></a-entity>

<!-- gerichtetes Licht -->

<a-entity light="type: directional; intensity: 0.6" position="2 4 2"></a-entity>

<!-- =============================== -->
<!-- Spieler -->
<!-- =============================== -->

<a-entity id="rig" movement-controls="speed:0.15">

<a-camera position="0 1.6 3"></a-camera>

<!-- linker Controller -->

<a-entity
hand-controls="hand: left"
laser-controls="hand: left"
raycaster="objects: .clickable"
super-hands>
</a-entity>

<!-- rechter Controller -->

<a-entity
hand-controls="hand: right"
laser-controls="hand: right"
raycaster="objects: .clickable"
super-hands>
</a-entity>

</a-entity>


<!-- =============================== -->
<!-- Moleküle -->
<!-- =============================== -->

<!-- Diamant -->

<a-entity
class="clickable"
gltf-model="#diamant"
position="0 1.4 -1"
scale="0.5 0.5 0.5"
grabbable
stretchable
draggable
rotatable>
</a-entity>



</a-scene>

</body>
</html>
