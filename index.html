<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Moleküle - Interaktiv</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>

</head>

<body>

<a-scene background="color: #ffffff">

<!-- Assets -->
<a-assets>

<a-asset-item id="diamant" src="Diamant.glb"></a-asset-item>
<a-asset-item id="graphit" src="Graphit.glb"></a-asset-item>
<a-asset-item id="eis" src="Eis.glb"></a-asset-item>
<a-asset-item id="mgcl2" src="MgCl2.glb"></a-asset-item>
<a-asset-item id="imidazol" src="Imidazol.glb"></a-asset-item>
<a-asset-item id="IL" src="IL.glb"></a-asset-item>

<canvas id="gridCanvas" width="128" height="128"></canvas>

</a-assets>


<!-- Spieler -->
<a-entity id="rig" movement-controls="speed: 0.15">

<a-entity id="camera" camera position="0 1.6 0" look-controls></a-entity>

<a-entity id="leftHand"
hand-controls="hand: left"
super-hands="colliderEvent: raycaster-intersection;
colliderEventProperty: els;
colliderEndEvent: raycaster-intersection-cleared;
colliderEndEventProperty: el"
sphere-collider="objects: .interactable">
</a-entity>

<a-entity id="rightHand"
hand-controls="hand: right"
super-hands="colliderEvent: raycaster-intersection;
colliderEventProperty: els;
colliderEndEvent: raycaster-intersection-cleared;
colliderEndEventProperty: el"
sphere-collider="objects: .interactable">
</a-entity>

</a-entity>


<!-- Boden -->
<a-plane position="0 0 0"
rotation="-90 0 0"
width="100"
height="100"
material="src: #gridCanvas; repeat: 100 100; shader: flat">
</a-plane>



<!-- ====================== -->
<!-- Moleküle im Kreis (10m) -->
<!-- ====================== -->


<!-- Diamant -->
<a-entity position="0 3 -10">

<a-entity class="interactable"
gltf-model="#diamant"
scale="0.5 0.5 0.5"
stretchable>
</a-entity>

<a-text value="Diamant"
position="0 1 0"
align="center"
color="black"
look-at="#camera">
</a-text>

</a-entity>



<!-- Graphit -->
<a-entity position="8.66 2 -5">

<a-entity class="interactable"
gltf-model="#graphit"
scale="0.5 0.5 0.5"
stretchable>
</a-entity>

<a-text value="Graphit"
position="0 1 0"
align="center"
color="black"
look-at="#camera">
</a-text>

</a-entity>



<!-- Eis -->
<a-entity position="8.66 3 5">

<a-entity class="interactable"
gltf-model="#eis"
scale="0.5 0.5 0.5"
stretchable>
</a-entity>

<a-text value="Eis"
position="0 1 0"
align="center"
color="black"
look-at="#camera">
</a-text>

</a-entity>



<!-- MgCl2 -->
<a-entity position="0 2 10">

<a-entity class="interactable"
gltf-model="#mgcl2"
scale="0.5 0.5 0.5"
stretchable>
</a-entity>

<a-text value="MgCl₂"
position="0 1 0"
align="center"
color="black"
look-at="#camera">
</a-text>

</a-entity>



<!-- Imidazol -->
<a-entity position="-8.66 4 5">

<a-entity class="interactable"
gltf-model="#imidazol"
scale="0.5 0.5 0.5"
stretchable>
</a-entity>

<a-text value="Imidazol"
position="0 1 0"
align="center"
color="black"
look-at="#camera">
</a-text>

</a-entity>



<!-- IL -->
<a-entity position="-8.66 2 -5">

<a-entity class="interactable"
gltf-model="#IL"
scale="3 3 3"
stretchable>
</a-entity>

<a-text value="IL"
position="0 1 0"
align="center"
color="black"
look-at="#camera">
</a-text>

</a-entity>



<!-- Licht -->
<a-entity light="type: ambient; intensity: 0.8"></a-entity>
<a-entity light="type: directional; intensity: 0.5" position="1 3 1"></a-entity>



</a-scene>



<script>

const canvas = document.getElementById('gridCanvas');
const ctx = canvas.getContext('2d');

ctx.fillStyle = 'white';
ctx.fillRect(0,0,128,128);

ctx.strokeStyle = '#00FF00';
ctx.lineWidth = 6;
ctx.strokeRect(0,0,128,128);

</script>

</body>
</html>
